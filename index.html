<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Mots de l'IA — Le Lab IA ADETEM</title>
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Supabase JS Client CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Google Fonts - Typographies Officielles ADETEM -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }
        h1, h2, .font-adetem {
            font-family: 'Montserrat', sans-serif;
        }
        .accordion-content {
            transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen selection:bg-cyan-500/20 selection:text-cyan-900">

    <!-- Header avec Logo Agrandir (x2) -->
    <header class="border-b border-slate-200 bg-white sticky top-0 z-50 shadow-xs">
        <div class="max-w-4xl mx-auto px-6 h-24 flex items-center justify-between">
            <div class="flex items-center">
                <!-- Logo doublé en taille (h-24 au lieu de h-12) -->
                <img 
                    src="https://goviudqrftefrnrdamxk.supabase.co/storage/v1/object/public/Visuels%20Lab%20IA/logo%20lab%20IA.png" 
                    alt="Logo Le Lab IA ADETEM" 
                    class="h-24 w-auto object-contain"
                />
            </div>
        </div>
    </header>

    <!-- Conteneur Principal -->
    <main class="max-w-4xl mx-auto px-6 py-12 md:py-16">
        
        <!-- Hero Section -->
        <section class="mb-12 border-b border-slate-200 pb-10">
            <h1 class="text-4xl md:text-5xl font-black tracking-tight text-[#002B49] mb-4 uppercase">
                Les Mots de l'IA
            </h1>
            <p class="text-slate-600 text-base md:text-lg font-normal max-w-2xl leading-relaxed">
                Le glossaire interactif du marketing augmenté. Conçu pour guider les professionnels du marketing vers une industrialisation responsable, maîtrisée et durable.
            </p>
        </section>

        <!-- Section Top 5 / Les 4 termes les plus recherchés -->
        <section class="mb-10 p-5 rounded-lg bg-white border border-slate-200 shadow-xs">
            <h2 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-3 flex items-center">
                <svg class="w-3.5 h-3.5 mr-2 text-cyan-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                </svg>
                Les termes les plus recherchés
            </h2>
            <div id="trending-container" class="flex flex-wrap gap-2">
                <!-- Rempli statiquement selon tes consignes avec les 4 termes spécifiés -->
                <button onclick="triggerSearchAndOpen('IAG (Intelligence Artificielle Générative)')" class="px-3 py-1.5 text-xs font-bold bg-slate-50 text-slate-700 border border-slate-200 rounded-md hover:bg-cyan-50 hover:border-cyan-200 hover:text-cyan-700 transition-all cursor-pointer">IAG</button>
                <button onclick="triggerSearchAndOpen('Large Language Model (LLM)')" class="px-3 py-1.5 text-xs font-bold bg-slate-50 text-slate-700 border border-slate-200 rounded-md hover:bg-cyan-50 hover:border-cyan-200 hover:text-cyan-700 transition-all cursor-pointer">Large Language Model</button>
                <button onclick="triggerSearchAndOpen('Prompt engenering / context engenering')" class="px-3 py-1.5 text-xs font-bold bg-slate-50 text-slate-700 border border-slate-200 rounded-md hover:bg-cyan-50 hover:border-cyan-200 hover:text-cyan-700 transition-all cursor-pointer">Prompt Engineering</button>
                <button onclick="triggerSearchAndOpen('Hallucination')" class="px-3 py-1.5 text-xs font-bold bg-slate-50 text-slate-700 border border-slate-200 rounded-md hover:bg-cyan-50 hover:border-cyan-200 hover:text-cyan-700 transition-all cursor-pointer">Hallucinations</button>
            </div>
        </section>

        <!-- Barre de Recherche Épurée avec Bouton -->
        <section class="mb-8 sticky top-28 z-40">
            <div class="flex items-center gap-2">
                <div class="relative flex-1 group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-cyan-600 transition-colors">
                        <svg class="w-5 h-5 stroke-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                    <input 
                        type="text" 
                        id="search-input" 
                        placeholder="Rechercher un terme, un concept..." 
                        class="w-full pl-12 pr-4 py-3.5 bg-white border border-slate-200 rounded-lg shadow-sm text-slate-900 placeholder-slate-400 focus:outline-hidden focus:ring-2 focus:ring-cyan-500/20 focus:border-cyan-600 transition-all text-base"
                    />
                </div>
                <button 
                    onclick="executeSearchClick()"
                    class="px-6 py-3.5 bg-[#002B49] text-white font-bold text-sm uppercase tracking-wider rounded-lg shadow-sm hover:bg-cyan-800 transition-all cursor-pointer"
                >
                    Rechercher
                </button>
            </div>
        </section>

        <!-- Liste Principale du Dictionnaire -->
        <section>
            <!-- Loader discret sans mentions superflues -->
            <div id="loading-state" class="py-12 text-center text-slate-500 font-medium">
                <div class="inline-block animate-spin rounded-full h-5 w-5 border-2 border-slate-300 border-t-cyan-600 mb-2"></div>
            </div>

            <!-- État vide -->
            <div id="empty-state" class="hidden py-12 text-center border border-dashed border-slate-300 rounded-lg bg-white">
                <p class="text-slate-500 text-sm">Aucune correspondance trouvée pour cette recherche.</p>
                <button onclick="resetSearch()" class="mt-2 text-xs font-bold text-cyan-600 hover:text-cyan-700 transition-colors">Réinitialiser le filtre</button>
            </div>

            <!-- Conteneur des Mots -->
            <div id="dictionary-list" class="bg-white border border-slate-200 rounded-lg shadow-xs divide-y divide-slate-100 overflow-hidden"></div>
        </section>

    </main>

    <!-- Footer vide et épuré -->
    <footer class="py-12"></footer>

    <!-- Script de Logique & Connexion Supabase -->
    <script>
        const SUPABASE_URL = 'https://goviudqrftefrnrdamxk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdvdml1ZHFyZnRlZnJucmRhbXhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MTYxOTYsImV4cCI6MjA5ODQ5MjE5Nn0.BnjHGjgCD3uVch5kT2FyRiGXzAVM9k6rMpq4p2Hhci4';

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let dictionaryData = [];

        const searchInput = document.getElementById('search-input');
        const dictionaryList = document.getElementById('dictionary-list');
        const loadingState = document.getElementById('loading-state');
        const emptyState = document.getElementById('empty-state');

        document.addEventListener('DOMContentLoaded', async () => {
            await fetchDictionaryData();
            setupEventListeners();
        });

        async function fetchDictionaryData() {
            try {
                const { data, error } = await supabase
                    .from('dictionary')
                    .select('*')
                    .order('Terme', { ascending: true });

                if (error) throw error;

                // Filtrage strict : on ne garde que les entrées qui ont un terme et une définition factuelle
                dictionaryData = (data || []).filter(item => item["Terme"] && item["Définition factuelle"]);
                loadingState.classList.add('hidden');
                
                renderDictionary(dictionaryData);

            } catch (error) {
                console.error('Erreur Supabase Fetch:', error.message);
                loadingState.innerHTML = '';
            }
        }

        function renderDictionary(data) {
            if (data.length === 0) {
                dictionaryList.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');

            dictionaryList.innerHTML = data.map(item => `
                <div class="dictionary-item group transition-colors duration-150 hover:bg-slate-50/50" id="term-${slugify(item["Terme"])}">
                    
                    <!-- Entête du terme -->
                    <button 
                        onclick="toggleAccordion('content-${item.id}', 'icon-${item.id}')"
                        class="w-full flex items-center justify-between text-left px-6 py-4.5 cursor-pointer focus:outline-hidden"
                    >
                        <span class="text-lg font-bold text-[#002B49] group-hover:text-cyan-700 transition-colors tracking-tight font-adetem">
                            ${item["Terme"]}
                        </span>
                        <svg 
                            id="icon-${item.id}"
                            class="w-4 h-4 text-slate-400 transform transition-transform duration-300 ease-in-out group-hover:text-slate-600" 
                            fill="none" 
                            stroke="currentColor" 
                            viewBox="0 0 24 24"
                        >
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>

                    <!-- Accordéon tiroir dépliable -->
                    <div id="content-${item.id}" class="accordion-content max-h-0 overflow-hidden opacity-0 bg-slate-50/30">
                        <div class="px-6 pb-6 pt-1 space-y-4 text-slate-800">
                            
                            <!-- Définition -->
                            <div class="text-base leading-relaxed text-slate-600 font-normal border-b border-slate-100 pb-4">
                                ${item["Définition factuelle"]}
                            </div>
                            
                            <!-- Grille d'Opportunités / Risques -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-1">
                                ${item["Opportunités (pour un marketeur)"] ? `
                                    <div class="p-4 bg-white border border-slate-200 rounded-md shadow-2xs">
                                        <div class="text-xs font-bold text-emerald-700 uppercase tracking-wider mb-1 flex items-center">
                                            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 mr-1.5"></span> Opportunités Métier
                                        </div>
                                        <p class="text-xs text-slate-600 leading-relaxed">${item["Opportunités (pour un marketeur)"]}</p>
                                    </div>
                                ` : ''}
                                
                                ${item["Risques (pour un marketeur)"] ? `
                                    <div class="p-4 bg-white border border-slate-200 rounded-md shadow-2xs">
                                        <div class="text-xs font-bold text-rose-700 uppercase tracking-wider mb-1 flex items-center">
                                            <span class="w-1.5 h-1.5 rounded-full bg-rose-500 mr-1.5"></span> Risques & Vigilance
                                        </div>
                                        <p class="text-xs text-slate-600 leading-relaxed">${item["Risques (pour un marketeur)"]}</p>
                                    </div>
                                ` : ''}
                            </div>

                            <!-- Question de pilotage -->
                            ${item["Question de pilotage"] ? `
                                <div class="p-4 bg-[#002B49] text-white rounded-md shadow-xs mt-2">
                                    <div class="text-[10px] font-bold uppercase tracking-widest text-cyan-300 mb-1">
                                        Question de pilotage managérial
                                    </div>
                                    <p class="text-sm font-medium leading-relaxed">${item["Question de pilotage"]}</p>
                                </div>
                            ` : ''}

                        </div>
                    </div>
                </div>
            `).join('');
        }

        function setupEventListeners() {
            // Recherche filtrée dynamique en tapant
            searchInput.addEventListener('input', (e) => {
                executeFilter(e.target.value);
            });
        }

        function executeFilter(val) {
            const query = val.toLowerCase().trim();
            if (!query) {
                renderDictionary(dictionaryData);
                return;
            }
            const filtered = dictionaryData.filter(item => 
                (item["Terme"] && item["Terme"].toLowerCase().includes(query)) || 
                (item["Définition factuelle"] && item["Définition factuelle"].toLowerCase().includes(query)) ||
                (item["Opportunités (pour un marketeur)"] && item["Opportunités (pour un marketeur)"].toLowerCase().includes(query)) ||
                (item["Risques (pour un marketeur)"] && item["Risques (pour un marketeur)"].toLowerCase().includes(query)) ||
                (item["Question de pilotage"] && item["Question de pilotage"].toLowerCase().includes(query))
            );
            renderDictionary(filtered);
        }

        // Action déclenchée par le bouton "Rechercher"
        function executeSearchClick() {
            executeFilter(searchInput.value);
        }

        function toggleAccordion(contentId, iconId) {
            const content = document.getElementById(contentId);
            const icon = document.getElementById(iconId);
            if (content.style.maxHeight && content.style.maxHeight !== '0px') {
                content.style.maxHeight = '0px';
                content.style.opacity = '0';
                icon.style.transform = 'rotate(0deg)';
            } else {
                document.querySelectorAll('.accordion-content').forEach(el => { el.style.maxHeight = '0px'; el.style.opacity = '0'; });
                document.querySelectorAll('.dictionary-item svg').forEach(svg => svg.style.transform = 'rotate(0deg)');
                content.style.maxHeight = content.scrollHeight + 'px';
                content.style.opacity = '1';
                icon.style.transform = 'rotate(180deg)';
            }
        }

        // Gestion du clic sur les boutons du Top 5
        function triggerSearchAndOpen(exactTermName) {
            searchInput.value = ''; // On réinitialise la recherche globale pour afficher tout le tableau
            executeFilter('');
            
            const targetItem = dictionaryData.find(item => item["Terme"].toLowerCase() === exactTermName.toLowerCase());
            if (targetItem) {
                setTimeout(() => {
                    toggleAccordion(`content-${targetItem.id}`, `icon-${targetItem.id}`);
                    document.getElementById(`term-${slugify(targetItem["Terme"])}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 50);
            }
        }

        function resetSearch() {
            searchInput.value = '';
            renderDictionary(dictionaryData);
            searchInput.focus();
        }

        function slugify(text) {
            return text.toString().toLowerCase().trim().replace(/\s+/g, '-').replace(/[^\w\-]+/g).replace(/\-\-+/g, '-');
        }
    </script>
</body>
</html>
