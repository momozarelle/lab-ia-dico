<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossaire interactif de l'IA pour le marketing</title>
    
    <!-- Favicon Officiel (Petit rond bleu) -->
    <link rel="icon" type="image/png" href="https://goviudqrftefrnrdamxk.supabase.co/storage/v1/object/public/Visuels%20Lab%20IA/rond.png">
    
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Supabase JS Client CDN -->

    <!-- Google Fonts - Alliance Inter (Moderne) & Playfair Display (Plume/Calligraphique) -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2 family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fbfbfa;
            color: #191919;
        }
        .font-serif-plume {
            font-family: 'Playfair Display', serif;
            font-style: italic;

        .accordion-content {
            transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease-in-out;

    </style>
</head>
<body class="min-h-screen selection:bg-stone-200 selection:text-stone-900">

    <!-- Header Épuré -->
    <header class="border-b border-stone-200/60 bg-[#fbfbfa] sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-6 h-24 flex items-center justify-between">
            <div class="flex items-center">
                <!-- Logo restauré dans ses couleurs bleues d'origine -->
                <img 
                    src="https://goviudqrftefrnrdamxk.supabase.co/storage/v1/object/public/Visuels%20Lab%20IA/logo%20lab%20IA.png" 
                    alt="Logo Le Lab IA ADETEM" 
                    class="h-16 w-auto object-contain"
                />
            </div>
            <span class="text-[11px] font-mono tracking-wider text-stone-400 uppercase">Version collaborative interne</span>
        </div>
    </header>

    <!-- Conteneur Principal -->
    <main class="max-w-3xl mx-auto px-6 py-12 md:py-16">
        
        <!-- Hero Section -->
        <section class="mb-12 border-b border-stone-200/60 pb-10">
            <h1 class="text-4xl md:text-5xl font-normal text-stone-950 tracking-tight mb-3 font-serif-plume">
                Les mots de l'IA.
            </h1>
            <p class="text-stone-500 text-base md:text-lg font-light leading-relaxed">
                Glossaire interactif de l'IA pour le marketing. Version collaborative interne connectée en temps réel.
            </p>
        </section>

        <!-- Section Top 5 Raccourcis Minimalistes -->
        <section class="mb-10 p-5 rounded-xl bg-white border border-stone-200/60 shadow-2xs">
            <h2 class="text-xs font-mono tracking-wider text-stone-400 uppercase mb-3 flex items-center">
                <!-- Pictogramme flèche ascendante restauré -->
                <svg class="w-3.5 h-3.5 mr-2 text-stone-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                </svg>
                Les termes les plus recherchés
            </h2>
            <div id="trending-container" class="flex flex-wrap gap-2">
                <span class="text-xs text-stone-400">Chargement des favoris...</span>
            </div>
        </section>

        <!-- Barre de Recherche Monochrome -->
        <section class="mb-10 sticky top-24 z-40 bg-[#fbfbfa]/90 backdrop-blur-md py-2">
            <div class="flex items-center gap-2">
                <div class="relative flex-1">
                    <input 
                        type="text" 
                        id="search-input" 
                        placeholder="Rechercher un terme, un concept..." 
                        class="w-full pl-4 pr-4 py-3 bg-white border border-stone-200 rounded-lg shadow-3xs text-stone-900 placeholder-stone-400 focus:outline-hidden focus:border-stone-400 transition-all text-sm"
                    />
                </div>
                <button 
                    type="button"
                    onclick="triggerSearch()"
                    class="px-5 py-3 bg-stone-950 text-white font-medium text-sm rounded-lg shadow-sm hover:bg-stone-800 transition-all cursor-pointer"
                >
                    Rechercher
                </button>
            </div>
        </section>

        <!-- Liste Principale du Dictionnaire -->
        <section class="mb-12">
            <div id="loading-state" class="py-12 text-center text-stone-400">
                <div class="inline-block animate-spin rounded-full h-4 w-4 border-2 border-stone-200 border-t-stone-600"></div>
            </div>
            <div id="dictionary-list" class="bg-white border border-stone-200/80 rounded-xl shadow-3xs divide-y divide-stone-100 overflow-hidden hidden"></div>
        </section>

        <!-- Section de Création Épurée -->
        <section class="mb-16 border-t border-stone-200/60 pt-8">
            <button 
                type="button"
                id="toggle-add-form-btn"
                onclick="toggleAddForm()" 
                class="w-full py-3.5 bg-white text-stone-800 font-medium text-sm border border-stone-200 rounded-xl shadow-3xs hover:bg-stone-50 transition-all cursor-pointer flex items-center justify-center space-x-2"
            >
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span>Ajouter un nouveau mot</span>
            </button>

            <!-- Formulaire d'ajout -->
            <div id="add-word-form-container" class="mt-4 bg-white border border-stone-200 rounded-xl p-6 shadow-3xs max-h-0 overflow-hidden opacity-0 transition-all duration-300 ease-in-out">
                <div class="grid grid-cols-1 gap-4 text-xs tracking-wide">
                    <div>
                        <label class="block font-medium text-stone-400 uppercase mb-1">Nom du mot</label>
                        <input type="text" id="new-term" class="w-full p-2.5 bg-stone-50/50 border border-stone-200 rounded-lg focus:outline-hidden focus:border-stone-400 text-sm">
                    </div>
                    <div>
                        <label class="block font-medium text-stone-400 uppercase mb-1">Définition factuelle</label>
                        <textarea id="new-definition" rows="3" class="w-full p-2.5 bg-stone-50/50 border border-stone-200 rounded-lg focus:outline-hidden focus:border-stone-400 text-sm"></textarea>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block font-medium text-stone-400 uppercase mb-1">Enjeux & Opportunités</label>
                            <textarea id="new-opportunities" rows="3" class="w-full p-2.5 bg-stone-50/50 border border-stone-200 rounded-lg focus:outline-hidden focus:border-stone-400 text-sm"></textarea>
                        </div>
                        <div>
                            <label class="block font-medium text-stone-400 uppercase mb-1">Facteurs de Risque</label>
                            <textarea id="new-risks" rows="3" class="w-full p-2.5 bg-stone-50/50 border border-stone-200 rounded-lg focus:outline-hidden focus:border-stone-400 text-sm"></textarea>
                        </div>
                    </div>
                    <div>
                        <label class="block font-medium text-stone-400 uppercase mb-1">Question de pilotage managérial</label>
                        <input type="text" id="new-questions" class="w-full p-2.5 bg-stone-50/50 border border-stone-200 rounded-lg focus:outline-hidden focus:border-stone-400 text-sm">
                    </div>
                    <div class="pt-2 flex items-center space-x-2">
                        <button type="button" onclick="createWord()" class="px-5 py-2.5 bg-stone-950 text-white font-medium rounded-lg hover:bg-stone-800 cursor-pointer">Ajouter mon mot</button>
                        <button type="button" onclick="toggleAddForm()" class="px-5 py-2.5 bg-stone-100 text-stone-600 rounded-lg hover:bg-stone-200 cursor-pointer">Annuler</button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <footer class="py-8"></footer>

    <!-- Logique Applicative Unifiée -->
    <script>
        const SUPABASE_URL = 'https://goviudqrftefrnrdamxk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdvdml1ZHFyZnRlZnJucmRhbXhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MTYxOTYsImV4cCI6MjA5ODQ5MjE5Nn0.BnjHGjgCD3uVch5kT2FyRiGXzAVM9k6rMpq4p2Hhci4';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let dictionaryData = [];

        const searchInput = document.getElementById('search-input');
        const dictionaryList = document.getElementById('dictionary-list');
        const loadingState = document.getElementById('loading-state');
        const trendingContainer = document.getElementById('trending-container');
        const addWordFormContainer = document.getElementById('add-word-form-container');

        document.addEventListener('DOMContentLoaded', async () => {
            await fetchDictionaryData();
            setupKeyboardEvent();
        });

        async function fetchDictionaryData() {
            try {
                const { data, error } = await supabaseClient.from('dictionary').select('*');
                if (error) throw error;
                dictionaryData = data || [];
                
                if (loadingState) loadingState.classList.add('hidden');
                if (dictionaryList) dictionaryList.classList.remove('hidden');
                
                sortAndRenderAll();
            } catch (error) {
                console.error(error.message);
            }
        }

        function sortAndRenderAll() {
            dictionaryData.sort((a, b) => a.term.localeCompare(b.term, 'fr', { sensitivity: 'base' }));
            renderTrendingHeader();
            renderDictionary(dictionaryData);
        }

        function renderTrendingHeader() {
            const trendingItems = dictionaryData.filter(item => item.is_trending).slice(0, 5);
            if (trendingItems.length === 0) {
                trendingContainer.innerHTML = `<span class="text-xs text-stone-400 font-light italic">Aucun mot favori sélectionné. Utilisez l'étoile d'un mot ci-dessous pour piloter ce Top 5.</span>`;
                return;
            }
            trendingContainer.innerHTML = trendingItems.map(item => `
                <button type="button" onclick="scrollToAndOpen('${item.term.replace(/'/g, "\\'")}')" class="px-3 py-1.5 text-xs bg-stone-50 text-stone-700 border border-stone-200 rounded-md hover:bg-stone-950 hover:text-white hover:border-stone-950 transition-all cursor-pointer font-medium">
                    ${item.term.split(' (')[0]}
                </button>
            `).join('');
        }

        function renderDictionary(data) {
            if (!dictionaryList) return;
            dictionaryList.innerHTML = data.map(item => `
                <div class="dictionary-item bg-white" id="term-${slugify(item.term)}">
                    
                    <!-- Ligne Principale Épurée Claude Style -->
                    <div class="w-full flex items-center justify-between px-6 py-4.5 border-b border-stone-100 bg-white">
                        <button type="button" onclick="toggleAccordion('content-${item.id}', 'icon-${item.id}')" class="flex-1 text-left cursor-pointer focus:outline-hidden">
                            <span class="text-base font-semibold text-stone-900 hover:text-stone-600 transition-colors tracking-tight">
                                ${item.term}
                            </span>
                        </button>
                        
                        <!-- Actions Linéaires Fines -->
                        <div class="flex items-center space-x-1">
                            <!-- Bouton Étoile Pilotage Top 5 -->
                            <button type="button" onclick="toggleTrendingState('${item.id}', ${item.is_trending})" class="p-2 rounded-md hover:bg-stone-50 text-sm cursor-pointer select-none transition-all" title="Piloter le Top 5">
                                ${item.is_trending ? '<span class="text-amber-500">★</span>' : '<span class="text-stone-300 hover:text-stone-500">☆</span>'}
                            </button>
                            <!-- Bouton Modifier (Icône Crayon Fline) -->
                            <button type="button" onclick="enableInlineEdit('${item.id}')" class="p-2 rounded-md hover:bg-stone-50 text-stone-400 hover:text-stone-900 transition-all cursor-pointer" title="Modifier">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                            </button>
                            <!-- Bouton Supprimer (Icône Corbeille) -->
                            <button type="button" onclick="deleteWord('${item.id}', '${item.term.replace(/'/g, "\\'")}')" class="p-2 rounded-md hover:bg-stone-50 text-stone-300 hover:text-stone-900 transition-all cursor-pointer" title="Supprimer">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-1Normally I can help with things like this, but I don't seem to have access to that content. You can try again or ask me for something else.
